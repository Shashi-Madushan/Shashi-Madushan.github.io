<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <link rel="stylesheet" href="/styles/home.css">
  <link rel="stylesheet" href="/styles/landingPageAnimation.css">

<body>
  <!-- Home Section -->
  <section id="home">
    <h1>Home</h1>

    <div class="typing-container">
      <span id="typing" class="typing-text"></span>
      <div class="cursor"></div>
    </div>
    <div class="animation">
      <div class="box-of-star1">
        <div class="star star-position1"></div>
        <div class="star star-position2"></div>
        <div class="star star-position3"></div>
        <div class="star star-position4"></div>
        <div class="star star-position5"></div>
        <div class="star star-position6"></div>
        <div class="star star-position7"></div>
      </div>
      <div class="box-of-star2">
        <div class="star star-position1"></div>
        <div class="star star-position2"></div>
        <div class="star star-position3"></div>
        <div class="star star-position4"></div>
        <div class="star star-position5"></div>
        <div class="star star-position6"></div>
        <div class="star star-position7"></div>
      </div>
      <div class="box-of-star3">
        <div class="star star-position1"></div>
        <div class="star star-position2"></div>
        <div class="star star-position3"></div>
        <div class="star star-position4"></div>
        <div class="star star-position5"></div>
        <div class="star star-position6"></div>
        <div class="star star-position7"></div>
      </div>
      <div class="box-of-star4">
        <div class="star star-position1"></div>
        <div class="star star-position2"></div>
        <div class="star star-position3"></div>
        <div class="star star-position4"></div>
        <div class="star star-position5"></div>
        <div class="star star-position6"></div>
        <div class="star star-position7"></div>
      </div>
      <div data-js="astro" class="astronaut">
        <div class="head"></div>
        <div class="arm arm-left"></div>
        <div class="arm arm-right"></div>
        <div class="body">
          <div class="panel"></div>
        </div>
        <div class="leg leg-left"></div>
        <div class="leg leg-right"></div>
        <div class="schoolbag"></div>
      </div>
    </div>
    
  </section>

  <!-- About Section -->
  <section id="about">
    <h1>Services</h1>
    <div class="carosoul-container">
      <div class="carousel" id="carousel">
        <div class="carousel-images">
          <img src="https://via.placeholder.com/800x400?text=Slide+1" alt="Slide 1" class="active">
          <img src="https://via.placeholder.com/800x400?text=Slide+2" alt="Slide 2">
          <img src="https://via.placeholder.com/800x400?text=Slide+3" alt="Slide 3">
        </div>
        <div class="prev">&#10094;</div>
        <div class="next">&#10095;</div>
      </div>

      <div class="dots">
        <span class="dot active-dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </section>

  <!-- Portfolio Section -->
  <section id="portfolio" class="projects">
    <h1>Recent Projects</h1>
    <!-- Portfolio content -->
    <div class="cards" id="card-container"></div>
  </section>

  <!-- Resume Section -->
  <section id="resume">
    <h1>Recent Bolgs</h1>
    <div id="blog-card-container" class="blog-card-container"></div>
  </section>
  <script src="../scripts/home.js"></script>
</body>

</html>
